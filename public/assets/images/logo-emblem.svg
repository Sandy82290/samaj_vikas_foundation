<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 -2 100 100" width="96" height="96" role="img" aria-label="Samaj Vikas Foundation emblem">
  <defs>
    <path id="emTop" d="M8,48 A40,40 0 0 1 88,48" />
    <path id="emBot" d="M16,48 A32,32 0 0 0 80,48" />
  </defs>

  <!-- Outer ring -->
  <circle cx="48" cy="48" r="47" fill="#123A63" />
  <circle cx="48" cy="48" r="46.5" fill="none" stroke="#D4AF37" stroke-width="1" />
  <circle cx="48" cy="48" r="33.5" fill="none" stroke="#D4AF37" stroke-width="1" />

  <!-- Curved seal text -->
  <text fill="#ffffff" font-family="'Mukta','Noto Sans Devanagari',sans-serif" font-weight="600" font-size="6.4" letter-spacing="0.2">
    <textPath href="#emTop" startOffset="50%" text-anchor="middle">समाज विकास फाउंडेशन</textPath>
  </text>
  <text fill="#ffffff" font-family="'Mukta','Noto Sans Devanagari',sans-serif" font-weight="600" font-size="6.4" letter-spacing="0.4">
    <textPath href="#emBot" startOffset="50%" text-anchor="middle">मधुबनी - बिहार</textPath>
  </text>

  <!-- Gold stars (left & right of band) -->
  <polygon fill="#D4AF37" points="9,44 9.9,46.76 12.8,46.76 10.46,48.47 11.35,51.24 9,49.53 6.65,51.24 7.55,48.47 5.2,46.76 8.1,46.76" />
  <polygon fill="#D4AF37" points="87,44 87.9,46.76 90.8,46.76 88.46,48.47 89.35,51.24 87,49.53 84.65,51.24 85.55,48.47 83.2,46.76 86.1,46.76" />

  <!-- Inner disk -->
  <circle cx="48" cy="48" r="33" fill="#ffffff" />

  <!-- House roof -->
  <path d="M21,45 L48,22 L75,45" fill="none" stroke="#0E6A7D" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round" />

  <!-- Cupped hands -->
  <path d="M31,57 C24,59 21,66 26,72 C30,77 38,79 47,80 L47,73 C40,72 35,69 33,64 C32,61 32,58 31,57 Z" fill="#0E6A7D" />
  <path d="M65,57 C72,59 75,66 70,72 C66,77 58,79 49,80 L49,73 C56,72 61,69 63,64 C64,61 64,58 65,57 Z" fill="#0E6A7D" />
  <path d="M38,60 C40,58 44,58 47,60 L47,74 L40,72 Z" fill="#14808f" opacity="0.55" />
  <path d="M58,60 C56,58 52,58 49,60 L49,74 L56,72 Z" fill="#14808f" opacity="0.55" />

  <!-- Medallion -->
  <circle cx="48" cy="44" r="14" fill="#ffffff" stroke="#0E6A7D" stroke-width="1.8" />

  <!-- Leaf / plant (top-left) -->
  <path d="M44,45 C44,41 42,38 39,37 C40,40 40,43 44,45 Z" fill="#2e8b57" />
  <path d="M44,45 C44,41 46,39 49,38 C48,41 47,43 44,45 Z" fill="#3aa06a" />
  <line x1="44" y1="45" x2="44" y2="48" stroke="#2e8b57" stroke-width="1.1" stroke-linecap="round" />

  <!-- Globe (top-right) -->
  <circle cx="53" cy="40" r="4" fill="#ffffff" stroke="#0E6A7D" stroke-width="1" />
  <line x1="49" y1="40" x2="57" y2="40" stroke="#0E6A7D" stroke-width="0.8" />
  <line x1="53" y1="36" x2="53" y2="44" stroke="#0E6A7D" stroke-width="0.8" />
  <ellipse cx="53" cy="40" rx="1.8" ry="4" fill="none" stroke="#0E6A7D" stroke-width="0.8" />

  <!-- Open book (bottom) -->
  <path d="M40,50 C43,48.6 46,48.6 48,49.6 C50,48.6 53,48.6 56,50 L56,53.4 C53,52 50,52 48,53 C46,52 43,52 40,53.4 Z" fill="#123A63" />
  <line x1="48" y1="49.8" x2="48" y2="52.8" stroke="#ffffff" stroke-width="0.7" />

  <!-- Handshake hint (under book) -->
  <path d="M43,56 L48,54.5 L53,56" fill="none" stroke="#0E6A7D" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" />
</svg>
