<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-label="Community development illustration">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E6A7D"/>
      <stop offset="1" stop-color="#123A63"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5D77E"/>
      <stop offset="1" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#sky)"/>
  <circle cx="940" cy="190" r="120" fill="url(#sun)" opacity="0.9"/>
  <g opacity="0.12" fill="#ffffff">
    <circle cx="180" cy="120" r="3"/><circle cx="320" cy="80" r="2"/><circle cx="500" cy="150" r="2.5"/>
    <circle cx="700" cy="90" r="2"/><circle cx="1080" cy="110" r="3"/><circle cx="60" cy="220" r="2"/>
  </g>
  <!-- Rolling hills -->
  <path d="M0 560 Q300 470 600 540 T1200 520 V760 H0 Z" fill="#0b5867"/>
  <path d="M0 620 Q350 560 720 610 T1200 600 V760 H0 Z" fill="#0e6a7d"/>
  <!-- Houses / village -->
  <g fill="#F5F5F5">
    <rect x="150" y="540" width="90" height="70" rx="4"/><path d="M140 540 L195 500 L250 540 Z" fill="#D4AF37"/>
    <rect x="300" y="555" width="80" height="60" rx="4"/><path d="M292 555 L340 522 L388 555 Z" fill="#D4AF37"/>
  </g>
  <!-- People holding hands (unity) -->
  <g fill="#ffffff">
    <g transform="translate(560,470)"><circle cx="0" cy="0" r="20"/><path d="M-20 26c0-14 8-22 20-22s20 8 20 22v34h-40z"/></g>
    <g transform="translate(660,470)"><circle cx="0" cy="0" r="20"/><path d="M-20 26c0-14 8-22 20-22s20 8 20 22v34h-40z"/></g>
    <g transform="translate(760,470)"><circle cx="0" cy="0" r="20"/><path d="M-20 26c0-14 8-22 20-22s20 8 20 22v34h-40z"/></g>
  </g>
  <!-- Tree -->
  <g transform="translate(1000,480)"><rect x="-6" y="40" width="12" height="80" fill="#7a5230"/><circle cx="0" cy="20" r="46" fill="#2e8b57"/><circle cx="-34" cy="44" r="34" fill="#3aa06a"/><circle cx="34" cy="44" r="34" fill="#3aa06a"/></g>
</svg>
